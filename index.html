  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Segoe UI',system-ui,sans-serif;background:#eef2f7;color:#1a2332;min-height:100vh;}
    a{color:#003087;}

    /* ── Shell ── */
    .app-header{background:linear-gradient(135deg,#002060 0%,#003087 100%);color:white;padding:14px 28px;display:flex;align-items:center;gap:14px;box-shadow:0 2px 8px rgba(0,0,0,.25);}

    .app-header .sub{font-size:12px;opacity:.75;margin-top:2px;}
    .nav-tabs{background:#002060;display:flex;gap:0;padding:0 28px;border-bottom:2px solid #001540;}
    .nav-tab{padding:11px 22px;color:rgba(255,255,255,.65);cursor:pointer;font-size:13.5px;font-weight:500;border-bottom:3px solid transparent;transition:all .2s;white-space:nowrap;}

    .nav-tab.active{color:white;border-bottom-color:#5ba3f5;}
    .content{max-width:1300px;margin:0 auto;padding:24px 28px;}

    /* ── Cards ── */
    .card{background:white;border-radius:10px;box-shadow:0 1px 5px rgba(0,0,0,.09);padding:22px;margin-bottom:18px;}
    .card-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
    .card-title{font-size:15px;font-weight:700;color:#002060;}

    /* ── Buttons ── */
    .btn{padding:8px 16px;border-radius:7px;border:none;cursor:pointer;font-size:13.5px;font-weight:500;transition:all .15s;display:inline-flex;align-items:center;gap:5px;}
    .btn-primary{background:#003087;color:white;} .btn-primary:hover{background:#002060;}
    .btn-success{background:#1a6e3c;color:white;} .btn-success:hover{background:#145530;}
    .btn-danger{background:#b91c1c;color:white;} .btn-danger:hover{background:#991b1b;}
    .btn-secondary{background:#e8f0fe;color:#003087;} .btn-secondary:hover{background:#d0e0fc;}
    .btn-outline{background:transparent;border:1.5px solid #003087;color:#003087;} .btn-outline:hover{background:#e8f0fe;}

    .btn:disabled{opacity:.6;cursor:not-allowed;}

    /* ── Forms ── */

    /* ── Table ── */

    /* ── Modal ── */
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;}
    .modal{background:white;border-radius:12px;max-width:780px;width:100%;max-height:92vh;overflow-y:auto;box-shadow:0 12px 40px rgba(0,0,0,.25);}
    .mhd{padding:18px 24px;border-bottom:1px solid #e8edf3;display:flex;justify-content:space-between;align-items:center;}
    .mtitle{font-size:17px;font-weight:700;color:#002060;}
    .mbody{padding:22px 24px;}
    .mftr{padding:14px 24px;border-top:1px solid #e8edf3;display:flex;justify-content:flex-end;gap:10px;}
    .xbtn{background:none;border:none;font-size:26px;cursor:pointer;color:#94a3b8;line-height:1;} .xbtn:hover{color:#475569;}

    /* ── Alerts ── */

    /* ── Stats ── */
    .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;}
    .stat{background:white;border-radius:10px;padding:16px 20px;box-shadow:0 1px 5px rgba(0,0,0,.08);border-left:4px solid #003087;}

    /* ── Photo ── */

    /* ── Protocol label ── */
    .pl{width:100%;max-width:780px;background:white;font-family:Arial,sans-serif;font-size:8.5px;border:1.5px solid #000;margin:0 auto;}
    .pl table{width:100%;border-collapse:collapse;}
    .pl td,.pl th{border:1px solid #000;padding:3px 5px;vertical-align:top;}

    /* ── QR item selector ── */
    .item-card{padding:10px 12px;border-radius:7px;cursor:pointer;border:1.5px solid #e2e8f0;transition:all .15s;background:#f8fafc;}
    .item-card:hover{background:#f0f4ff;border-color:#93c5fd;}
    .item-card.sel{background:#e8f0fe;border-color:#003087;}
    .item-code{font-weight:700;font-size:12.5px;color:#002060;font-family:monospace;}

<body>
<div id="root"></div>

<script type="text/babel">
const {useState, useEffect, useRef} = React;

/* ═══════════════════════ UTILS ═══════════════════════ */
const uuid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,7);
const today = () => new Date().toISOString().split('T')[0];
const fmtDate = d => d ? new Date(d+'T12:00:00').toLocaleDateString('es-CL') : '—';
const isExpired = d => d && new Date(d+'T23:59:59') < new Date();

const getInitials = name => {
  if (!name) return 'XX';
  const parts = name.trim().split(/\s+/).filter(Boolean);
  if (parts.length >= 2) return (parts[0][0] + parts[1][0]).toUpperCase();
  return parts[0].slice(0,2).toUpperCase();
};

const typeCode = {material:'M', probeta:'P', equipo:'E'};

const generateFolio = (supervisor, alumno, tipo, items) => {
  const sup = getInitials(supervisor);
  const alu = getInitials(alumno);
  const tc = typeCode[tipo] || 'M';
  const prefix = `${sup}-${alu}-${tc}`;
  const existing = items.filter(i => i.folio && i.folio.startsWith(prefix));
  const num = String(existing.length + 1).padStart(4,'0');
  return `${prefix}-${num}`;
};

const load = (k, d=[]) => { try{ return JSON.parse(localStorage.getItem(k)) || d; }catch{ return d; } };
const save = (k,v) => localStorage.setItem(k, JSON.stringify(v));

const toB64 = d => { try{ return btoa(encodeURIComponent(JSON.stringify(d))); }catch{ return ''; } };
const fromB64 = s => { try{ return JSON.parse(decodeURIComponent(atob(s))); }catch{ return null; } };

/* ═══════════════════════ QR COMPONENT ═══════════════════════ */
function QRImg({value, size=100}) {
  const ref = useRef();
  useEffect(() => {
    if (!ref.current || !value) return;
    ref.current.innerHTML = '';
    try {
      new window.QRCode(ref.current, {
        text: value, width: size, height: size,
        colorDark:'#000', colorLight:'#fff',
        correctLevel: window.QRCode.CorrectLevel.M
      });
    } catch(e){}
  }, [value, size]);
  return <div ref={ref} style={{lineHeight:0}} />;
}

/* ═══════════════════════ PUC LOGO SVG ═══════════════════════ */
const PUCLogo = ({size=46}) => (
  <svg width={size} height={size} viewBox="0 0 46 46" fill="none">
    <circle cx="23" cy="23" r="22" fill="#003087"/>
    <circle cx="23" cy="23" r="20" fill="none" stroke="white" strokeWidth=".7"/>
    <text x="23" y="19" textAnchor="middle" fill="white" fontSize="7.5" fontWeight="bold" fontFamily="Arial">PUC</text>
    <text x="23" y="28" textAnchor="middle" fill="white" fontSize="5" fontFamily="Arial">CHILE</text>
    <path d="M10 32 Q23 37 36 32" stroke="gold" strokeWidth=".8" fill="none"/>
  </svg>
);

/* ═══════════════════════ SAFETY ICONS ═══════════════════════ */
const SafetyRow = () => {
  const icons = [
    {bg:'#003087',txt:'EQUIPO DE\nPROTECCIÓN\nOBLIGATORIO',sub:'Ref. SC-15', multi:true},
    {bg:'#003087',ico:'👁️',sub:'Ref. 277'},
    {bg:'#003087',ico:'🥾',sub:'Ref. SO-2130'},
    {bg:'#003087',ico:'🧤',sub:'Ref. SO-2174'},
    {bg:'#003087',ico:'⛑️',sub:'Ref. 258'},
    {bg:'#003087',ico:'😷',sub:'Ref. 284'},
    {bg:'#003087',ico:'🖐️',sub:'Ref. SO-2146'},
  ];
  return (
    <div style={{display:'flex',gap:4,flexWrap:'wrap',alignItems:'flex-end'}}>
      {icons.map((ic,i) => (
        <div key={i} style={{textAlign:'center',minWidth:42}}>
          <div style={{
            background:ic.bg,color:'white',borderRadius:3,padding:'4px 3px',
            fontSize: ic.multi?6.5:18,fontWeight:'bold',lineHeight:1.3,minHeight:40,
            display:'flex',alignItems:'center',justifyContent:'center',border:'1px solid #001540'
          }}>
            {ic.multi ? ic.txt.split('\n').map((t,i)=><div key={i}>{t}</div>) : ic.ico}
          </div>
          <div style={{fontSize:5.5,color:'#333',marginTop:1}}>{ic.sub}</div>
        </div>
      ))}
    </div>
  );
};

/* ═══════════════════════ PROTOCOL LABEL ═══════════════════════ */
function ProtocolLabel({item, user, itemUrl}) {
  const alumno = item.alumnoEjecutante || user?.nombre || '';
  const docente = item.supervisor || user?.supervisor || '';
  const contacto = item.contacto || user?.telefono || '';
  const correo = item.correoContacto || user?.correo || '';

  return (
    <div className="pl" id="protocol-label">
      {/* HEADER */}
      <table style={{marginBottom:0}}>
        <tbody>
          <tr>
            <td rowSpan={2} style={{width:54,textAlign:'center',verticalAlign:'middle',padding:4}}>
              <PUCLogo size={46}/>
            </td>
            <td style={{fontWeight:'bold',fontSize:9,padding:'3px 5px'}}>
              Pontificia Universidad Católica de Chile
            </td>
            <td style={{fontWeight:'bold',fontSize:8,padding:'3px 5px',whiteSpace:'nowrap'}}>FECHA</td>
            <td style={{fontSize:8.5,padding:'3px 5px',minWidth:80}}>{fmtDate(item.fecha)}</td>
          </tr>
          <tr>
            <td colSpan={3} style={{fontSize:8,padding:'3px 5px'}}>
              Departamento de Ingeniería y Gestión de la construcción
            </td>
          </tr>
        </tbody>
      </table>

      {/* TITLE */}
      <div style={{border:'1px solid #000',borderTop:'none',textAlign:'center',fontWeight:'bold',
        fontSize:10,padding:'5px 4px',textTransform:'uppercase',letterSpacing:.5,background:'#f0f4ff'}}>
        PROTOCOLO DE ETIQUETADO DE MATERIALES Y/O PROBETAS DE ENSAYO
      </div>

      {/* MATERIAL ROW */}
      <table style={{marginTop:0}}>
        <tbody>
          <tr>
            <td style={{width:'42%',borderTop:'none',fontSize:8.5}}>
              <strong>MATERIAL / PROBETA DE ENSAYO: </strong>{item.nombre}
            </td>
            <td style={{borderTop:'none',borderLeft:'none',fontSize:8.5}}>
              <strong>Indicar contenido: </strong>{item.tipo?.toUpperCase()}
              {item.cantidad && <span style={{marginLeft:8,color:'#555'}}>Cantidad: {item.cantidad}</span>}
            </td>
          </tr>
        </tbody>
      </table>

      {/* FOLIO NOTE */}
      <div style={{border:'1px solid #000',borderTop:'none',padding:'2px 5px',fontSize:7,fontStyle:'italic',color:'#444'}}>
        N° FOLIO: Debe seguir el siguiente formato: iniciales del nombre del profesor responsable, luego del alumno revisor,
        M si es material o P si es probeta y el número de folio vamos a empezar de cero.
      </div>

      {/* BIG FOLIO + QR */}
      <div style={{border:'1px solid #000',borderTop:'none',display:'flex',alignItems:'center',
        justifyContent:'space-between',padding:'6px 14px',gap:8}}>
        <div style={{fontSize:38,fontWeight:'900',color:'#003087',letterSpacing:4,
          fontFamily:'Arial',flex:1,textAlign:'center',textShadow:'1px 1px 0 rgba(0,48,135,.15)'}}>
          {item.folio}
        </div>
        <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:3,minWidth:90}}>
          <QRImg value={itemUrl} size={80}/>
          <div style={{fontSize:7,fontWeight:'bold',textAlign:'center',maxWidth:86,color:'#002060'}}>{alumno}</div>
          <div style={{fontSize:6.5,textAlign:'center',maxWidth:86,color:'#555'}}>{item.nombre}</div>
        </div>
      </div>

      {/* ALUMNO / DOCENTE */}
      <table>
        <tbody>
          <tr>
            <td style={{width:'50%',borderTop:'none'}}>
              <div style={{fontWeight:'bold',fontSize:7.5,textTransform:'uppercase',color:'#002060'}}>ALUMNO EJECUTANTE</div>
              <div style={{fontSize:9.5,marginTop:5,minHeight:18,fontWeight:'500'}}>{alumno}</div>
            </td>
            <td style={{width:'50%',borderTop:'none',borderLeft:'none'}}>
              <div style={{fontWeight:'bold',fontSize:7.5,textTransform:'uppercase',color:'#002060'}}>DOCENTE RESPONSABLE</div>
              <div style={{fontSize:9.5,marginTop:5,minHeight:18,fontWeight:'500'}}>{docente}</div>
            </td>
          </tr>
        </tbody>
      </table>

      {/* CONTACTO / VIGENCIA / UBICACIÓN */}
      <table>
        <tbody>
          <tr>
            <td style={{width:'50%',borderTop:'none',verticalAlign:'top'}}>
              <div style={{fontWeight:'bold',fontSize:7.5,textTransform:'uppercase',color:'#002060'}}>CONTACTO</div>
              <div style={{fontSize:8.5,marginTop:4}}>{contacto}</div>
              <div style={{fontSize:8,color:'#555'}}>{correo}</div>
            </td>
            <td style={{width:'50%',borderTop:'none',borderLeft:'none',padding:0}}>
              <div style={{borderBottom:'1px solid #000',padding:'3px 5px'}}>
                <div style={{fontWeight:'bold',fontSize:7.5,textTransform:'uppercase',color:'#002060'}}>VIGENCIA</div>
                <div style={{fontSize:8.5,marginTop:2,color: isExpired(item.vigencia)?'#b91c1c':'inherit',fontWeight: isExpired(item.vigencia)?'bold':'normal'}}>
                  {fmtDate(item.vigencia)} {isExpired(item.vigencia)&&'⚠ VENCIDO'}
                </div>
              </div>
              <div style={{padding:'3px 5px'}}>
                <div style={{fontWeight:'bold',fontSize:7.5,textTransform:'uppercase',color:'#002060'}}>UBICACIÓN</div>
                <div style={{fontSize:8.5,marginTop:2}}>{item.ubicacion}</div>
              </div>
            </td>
          </tr>
        </tbody>
      </table>

      {/* COMENTARIOS / SEGURIDAD */}

        <tbody>
          <tr>
            <td style={{width:'50%',borderTop:'none',verticalAlign:'top'}}>

              <div style={{fontSize:8.5,minHeight:34,lineHeight:1.5}}>{item.observaciones}</div>
            </td>
            <td style={{width:'50%',borderTop:'none',borderLeft:'none',verticalAlign:'top'}}>

                <strong> MANUAL INSTRUCTIVO DE SEGURIDAD LABORATORIO DEPARTAMENTO DE INGENIERIA Y GESTIÓN DE LA CONSTRUCCIÓN.</strong>
              </div>
            </td>
          </tr>
        </tbody>

      {/* TACHAR */}
      <div style={{border:'1px solid #000',borderTop:'none',padding:'4px 5px'}}>

      {/* NOTA IMPORTANTE BODY */}

        CON EL FIN DE ESTAR EN CONOCIMIENTO DE LO QUE SE ESTÁ EJECUTANDO, CON EL OBJETIVO DE LLEVAR UN CONTROL DE TODOS LOS ELEMENTOS
        INVOLUCRADOS EN DICHA ACTIVIDAD. TIENEN LA OBLIGACIÓN DE ETIQUETAR CON ESTE FORMATO TODOS LOS MATERIALES Y PROBETAS DE ENSAYO.
        DICHAS ETIQUETAS DEBEN SER LEGIBLES, ESCRITAS EN UN MATERIAL RESISTENTE A LA HUMEDAD. NO SE ACEPTARÁN PROBETAS Y/O MATERIALES QUE
        NO ESTÉN ETIQUETADAS. TODA PERSONA ES RESPONSABLE DE MANTENER RESGUARDADOS BIEN IDENTIFICADOS SUS MATERIALES Y/O PROBETAS DE ENSAYO.
        TODO EXTRAVÍO DE MATERIAL Y/O PROBETAS DE ENSAYO QUE NO SE ENCUENTRE BIEN ETIQUETADO E INFORMADO AL ENCARGADO DE LABORATORIO,
        ES PLENA RESPONSABILIDAD DE LAS PERSONAS QUE ESTÉN EJECUTANDO DICHAS ACTIVIDADES.
        SE SOLICITA RESPETAR Y CUMPLIR EL PRESENTE PROTOCOLO PARA EL BUEN FUNCIONAMIENTO DE LOS LABORATORIOS DE INGENIERÍA Y CONSTRUCCIÓN.
      </div>

      {/* VERSION */}
      <div style={{border:'1px solid #000',borderTop:'none',padding:'2px 5px',fontSize:7,
        textAlign:'center',fontStyle:'italic',color:'#555'}}>
        VERSIÓN EVV 20-04-2026
      </div>
    </div>
  );
}

/* ═══════════════════════ ITEM DETAIL (QR destination) ═══════════════════════ */
function ItemDetailView({item}) {
  return (
    <div style={{maxWidth:600,margin:'36px auto',padding:'0 16px'}}>
      <div style={{background:'linear-gradient(135deg,#002060,#003087)',color:'white',padding:'14px 20px',
        borderRadius:'10px 10px 0 0',textAlign:'center'}}>

/* ═══════════════════════ USERS TAB ═══════════════════════ */
function UsersTab({users, setUsers}) {
  const [showForm, setShowForm] = useState(false);
  const [editId, setEditId] = useState(null);
  const [form, setForm] = useState({nombre:'',supervisor:'',investigacion:'',telefono:'',correo:''});
  const [search, setSearch] = useState('');
  const [alert, setAlert] = useState(null);

  const flash = (msg, type='as') => { setAlert({msg,type}); setTimeout(()=>setAlert(null),3500); };
  const F = (k,v) => setForm(f=>({...f,[k]:v}));

  const openNew = () => { setForm({nombre:'',supervisor:'',investigacion:'',telefono:'',correo:''}); setEditId(null); setShowForm(true); };
  const openEdit = u => { setForm({nombre:u.nombre,supervisor:u.supervisor,investigacion:u.investigacion,telefono:u.telefono,correo:u.correo}); setEditId(u.id); setShowForm(true); };

  const handleSave = () => {
    if (!form.nombre.trim()) return flash('El nombre es requerido','ae');
    if (!form.correo.trim()) return flash('El correo es requerido','ae');
    if (editId) {
      const upd = users.map(u => u.id===editId ? {...u,...form} : u);
      setUsers(upd); save('icc_users', upd); flash('Usuario actualizado');
    } else {
      const upd = [...users, {id:uuid(),...form,createdAt:new Date().toISOString()}];
      setUsers(upd); save('icc_users', upd); flash('Usuario creado');
    }
    setShowForm(false);
  };

  const handleDel = id => {
    if (!confirm('¿Eliminar usuario?')) return;
    const upd = users.filter(u=>u.id!==id); setUsers(upd); save('icc_users', upd); flash('Usuario eliminado');
  };

  const fil = users.filter(u =>
    u.nombre.toLowerCase().includes(search.toLowerCase()) ||
    (u.correo||'').toLowerCase().includes(search.toLowerCase()) ||
    (u.supervisor||'').toLowerCase().includes(search.toLowerCase())
  );

  return (
    <div>
      {alert && <div className={`alert ${alert.type}`}>{alert.msg}</div>}
      <div className="card">
        <div className="card-hd">
          <span className="card-title">👤 Gestión de Usuarios</span>
          <button className="btn btn-primary" onClick={openNew}>+ Nuevo Usuario</button>
        </div>
        <input className="fc" placeholder="🔍  Buscar por nombre, correo o supervisor…" value={search} onChange={e=>setSearch(e.target.value)} style={{marginBottom:14}}/>
        {fil.length===0 ? (
          <div className="empty"><div className="ei">👥</div><h3>Sin usuarios</h3><p>Crea el primer usuario para comenzar.</p></div>
        ) : (
          <div className="tw">
            <table>
              <thead><tr><th>Nombre</th><th>Supervisor / Docente</th><th>Investigación</th><th>Teléfono</th><th>Correo</th><th>Acciones</th></tr></thead>
              <tbody>
                {fil.map(u=>(
                  <tr key={u.id}>
                    <td><strong>{u.nombre}</strong></td>
                    <td>{u.supervisor}</td>
                    <td style={{maxWidth:200,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{u.investigacion}</td>
                    <td>{u.telefono}</td>
                    <td>{u.correo}</td>
                    <td><div style={{display:'flex',gap:6}}>
                      <button className="btn btn-secondary btn-sm" onClick={()=>openEdit(u)}>✏️</button>
                      <button className="btn btn-danger btn-sm" onClick={()=>handleDel(u.id)}>🗑️</button>
                    </div></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </div>

      {showForm && (
        <div className="overlay">
          <div className="modal">
            <div className="mhd"><span className="mtitle">{editId?'Editar':'Nuevo'} Usuario</span><button className="xbtn" onClick={()=>setShowForm(false)}>×</button></div>
            <div className="mbody">
              <div className="g2">
                <div className="fg"><label className="fl">Nombre completo *</label><input className="fc" value={form.nombre} onChange={e=>F('nombre',e.target.value)} placeholder="Ej: Fernando Asencio"/></div>
                <div className="fg"><label className="fl">Supervisor / Docente responsable</label><input className="fc" value={form.supervisor} onChange={e=>F('supervisor',e.target.value)} placeholder="Ej: Marcelo González"/></div>
                <div className="fg span2"><label className="fl">Nombre Investigación / Actividad</label><input className="fc" value={form.investigacion} onChange={e=>F('investigacion',e.target.value)} placeholder="Ej: Eficacia de fibras de madera en transmitancia térmica"/></div>
                <div className="fg"><label className="fl">Teléfono de contacto</label><input className="fc" value={form.telefono} onChange={e=>F('telefono',e.target.value)} placeholder="+56 9 1234 5678"/></div>
                <div className="fg"><label className="fl">Correo de contacto *</label><input className="fc" type="email" value={form.correo} onChange={e=>F('correo',e.target.value)} placeholder="nombre@uc.cl"/></div>
              </div>
            </div>
            <div className="mftr"><button className="btn btn-outline" onClick={()=>setShowForm(false)}>Cancelar</button><button className="btn btn-primary" onClick={handleSave}>{editId?'Actualizar':'Guardar'}</button></div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════ INVENTORY TAB ═══════════════════════ */
function InventoryTab({users, items, setItems, goLabel}) {
  const [showForm, setShowForm] = useState(false);
  const [search, setSearch] = useState('');
  const [filterType, setFilterType] = useState('all');
  const [alert, setAlert] = useState(null);
  const emptyForm = {userId:'',nombre:'',tipo:'material',fecha:today(),ubicacion:'',foto:'',observaciones:'',vigencia:'',cumpleSeguridad:'SI',fueraVigencia:'NO',informadoNota:'SI',cantidad:''};
  const [form, setForm] = useState(emptyForm);

  const flash = (msg,type='as') => { setAlert({msg,type}); setTimeout(()=>setAlert(null),4000); };
  const F = (k,v) => setForm(f=>({...f,[k]:v}));

  const handlePhoto = e => {
    const file = e.target.files[0]; if(!file) return;
    const rd = new FileReader();
    rd.onload = ev => F('foto', ev.target.result);
    rd.readAsDataURL(file);
  };

  const handleSave = () => {
    if (!form.userId) return flash('Selecciona un responsable','ae');
    if (!form.nombre.trim()) return flash('El nombre del ítem es requerido','ae');
    if (!form.vigencia) return flash('La vigencia es requerida','ae');
    const user = users.find(u=>u.id===form.userId);
    const folio = generateFolio(user?.supervisor, user?.nombre, form.tipo, items);
    const newItem = {
      id: uuid(), folio,
      ...form,
      alumnoEjecutante: user?.nombre,
      supervisor: user?.supervisor,
      contacto: user?.telefono,
      correoContacto: user?.correo,
      investigacion: user?.investigacion,
      createdAt: new Date().toISOString()
    };
    const upd = [...items, newItem];
    setItems(upd); save('icc_items', upd);
    setShowForm(false); setForm(emptyForm);
    flash(`✅ Ítem "${newItem.nombre}" registrado — Folio: ${folio}`);
  };

  const handleDel = id => {
    if(!confirm('¿Eliminar ítem del inventario?')) return;
    const upd = items.filter(i=>i.id!==id); setItems(upd); save('icc_items', upd);
  };

  const exportExcel = () => {
    const headers = ['N° FOLIO','FECHA INICIAL','NOMBRE INVESTIGACIÓN/ACTIVIDAD','MATERIAL/PROBETA','TIPO','CANTIDAD','ALUMNO EJECUTANTE','DOCENTE RESPONSABLE','CONTACTO','CORREO CONTACTO','UBICACIÓN','VIGENCIA (FECHA)','CUMPLE SEGURIDAD (SI/NO)','FUERA DE VIGENCIA (SI/NO)','INFORMADO POR NOTA (SI/NO)','COMENTARIOS/OBSERVACIONES'];
    const rows = items.map(i=>[
      i.folio, i.fecha, i.investigacion||'', i.nombre, (i.tipo||'').toUpperCase(), i.cantidad||'',
      i.alumnoEjecutante||'', i.supervisor||'', i.contacto||'', i.correoContacto||'',
      i.ubicacion||'', i.vigencia||'', i.cumpleSeguridad||'', i.fueraVigencia||'',
      i.informadoNota||'', i.observaciones||''
    ]);
    const wb = XLSX.utils.book_new();
    const ws = XLSX.utils.aoa_to_sheet([headers,...rows]);
    ws['!cols'] = headers.map(()=>({wch:24}));
    // Style header row
    const range = XLSX.utils.decode_range(ws['!ref']);
    for (let c = range.s.c; c <= range.e.c; c++) {
      const cell = ws[XLSX.utils.encode_cell({r:0,c})];
      if (cell) { cell.s = {font:{bold:true},fill:{fgColor:{rgb:'002060'}}}; }
    }
    XLSX.utils.book_append_sheet(wb, ws, 'Inventario ICC');
    XLSX.writeFile(wb, `Inventario_ICC_${today()}.xlsx`);
    flash('Excel exportado exitosamente');
  };

  const fil = items.filter(i => {
    const ms = search.toLowerCase();
    const matchS = !ms || (i.nombre||'').toLowerCase().includes(ms) || (i.folio||'').toLowerCase().includes(ms) || (i.alumnoEjecutante||'').toLowerCase().includes(ms);
    const matchT = filterType==='all' || i.tipo===filterType;
    return matchS && matchT;
  });

  const badgeClass = t => t==='material'?'bm':t==='probeta'?'bp':'be';

  return (
    <div>
      {alert && <div className={`alert ${alert.type}`}>{alert.msg}</div>}

      <div className="stats">
        {[
          {l:'Total Ítems',v:items.length,c:'#003087'},
          {l:'Materiales',v:items.filter(i=>i.tipo==='material').length,c:'#1e40af'},
          {l:'Probetas',v:items.filter(i=>i.tipo==='probeta').length,c:'#15803d'},
          {l:'Equipos',v:items.filter(i=>i.tipo==='equipo').length,c:'#92400e'},
        ].map(s=>(
          <div key={s.l} className="stat" style={{borderLeftColor:s.c}}>
            <div className="sv" style={{color:s.c}}>{s.v}</div>
            <div className="sl">{s.l}</div>
          </div>
        ))}
      </div>

      <div className="card">
        <div className="card-hd">
          <span className="card-title">📦 Inventario Bodega ICC</span>
          <div style={{display:'flex',gap:8}}>
            <button className="btn btn-success" onClick={exportExcel}>⬇️ Exportar Excel</button>
            <button className="btn btn-primary" onClick={()=>setShowForm(true)}>+ Agregar Ítem</button>
          </div>
        </div>

        <div style={{display:'flex',gap:10,marginBottom:14}}>
          <input className="fc" placeholder="🔍  Buscar por nombre, folio o responsable…" value={search} onChange={e=>setSearch(e.target.value)} style={{flex:1}}/>
          <select className="fc" style={{width:170}} value={filterType} onChange={e=>setFilterType(e.target.value)}>
            <option value="all">Todos los tipos</option>
            <option value="material">Material</option>
            <option value="probeta">Probeta</option>
            <option value="equipo">Equipo</option>
          </select>
        </div>

        {fil.length===0 ? (
          <div className="empty"><div className="ei">📦</div><h3>Sin ítems</h3><p>Agrega el primer ítem al inventario.</p></div>
        ) : (
          <div className="tw">
            <table>
              <thead><tr><th>Folio</th><th>Ítem</th><th>Tipo</th><th>Fecha</th><th>Responsable</th><th>Supervisor</th><th>Vigencia</th><th>Ubicación</th><th>Foto</th><th>Acciones</th></tr></thead>
              <tbody>
                {fil.map(i=>(
                  <tr key={i.id}>
                    <td><strong style={{color:'#003087',fontFamily:'monospace',fontSize:12.5}}>{i.folio}</strong></td>
                    <td>{i.nombre}</td>
                    <td><span className={`badge ${badgeClass(i.tipo)}`}>{(i.tipo||'').toUpperCase()}</span></td>
                    <td>{fmtDate(i.fecha)}</td>
                    <td>{i.alumnoEjecutante}</td>
                    <td>{i.supervisor}</td>
                    <td className={isExpired(i.vigencia)?'exp-warn':''}>{fmtDate(i.vigencia)}{isExpired(i.vigencia)&&' ⚠️'}</td>
                    <td style={{maxWidth:150,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{i.ubicacion}</td>
                    <td>{i.foto && <img src={i.foto} alt="" className="thumb"/>}</td>
                    <td><div style={{display:'flex',gap:6}}>
                      <button className="btn btn-secondary btn-sm" title="Ver etiqueta" onClick={()=>goLabel(i)}>🏷️</button>
                      <button className="btn btn-danger btn-sm" onClick={()=>handleDel(i.id)}>🗑️</button>
                    </div></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </div>

      {showForm && (
        <div className="overlay">
          <div className="modal" style={{maxWidth:820}}>
            <div className="mhd"><span className="mtitle">➕ Agregar Ítem al Inventario</span><button className="xbtn" onClick={()=>setShowForm(false)}>×</button></div>
            <div className="mbody">
              <div className="fg">
                <label className="fl">Responsable (Alumno Ejecutante) *</label>
                <select className="fc" value={form.userId} onChange={e=>F('userId',e.target.value)}>
                  <option value="">— Seleccionar usuario —</option>
                  {users.map(u=><option key={u.id} value={u.id}>{u.nombre}{u.supervisor ? ` — Sup: ${u.supervisor}` : ''}</option>)}
                </select>
                {users.length===0 && <div style={{fontSize:12,color:'#b91c1c',marginTop:4}}>⚠️ No hay usuarios. Ve a la pestaña Usuarios para crear uno primero.</div>}
              </div>
              <div className="g2">
                <div className="fg"><label className="fl">Nombre del ítem *</label><input className="fc" value={form.nombre} onChange={e=>F('nombre',e.target.value)} placeholder="Ej: Fibras de caña"/></div>
                <div className="fg"><label className="fl">Tipo de ítem *</label>
                  <select className="fc" value={form.tipo} onChange={e=>F('tipo',e.target.value)}>
                    <option value="material">Material</option>
                    <option value="probeta">Probeta</option>
                    <option value="equipo">Equipo</option>
                  </select>
                </div>
                <div className="fg"><label className="fl">Fecha de registro</label><input className="fc" type="date" value={form.fecha} onChange={e=>F('fecha',e.target.value)}/></div>
                <div className="fg"><label className="fl">Vigencia (fecha hasta) *</label><input className="fc" type="date" value={form.vigencia} onChange={e=>F('vigencia',e.target.value)}/></div>
                <div className="fg"><label className="fl">Cantidad</label><input className="fc" value={form.cantidad} onChange={e=>F('cantidad',e.target.value)} placeholder="Ej: 5 tinetas, 9 baldes…"/></div>
                <div className="fg"><label className="fl">Ubicación</label><input className="fc" value={form.ubicacion} onChange={e=>F('ubicacion',e.target.value)} placeholder="Ej: Laboratorio ICC Materiales (Sector Acopio)"/></div>
                <div className="fg span2"><label className="fl">Observaciones / Comentarios</label><textarea className="fc" rows={3} value={form.observaciones} onChange={e=>F('observaciones',e.target.value)} placeholder="Información adicional sobre el ítem, instrucciones de manejo…"/></div>
                <div className="fg"><label className="fl">Fotografía del ítem</label><input type="file" accept="image/*" onChange={handlePhoto} className="fc"/>{form.foto && <img src={form.foto} alt="preview" style={{marginTop:8,maxHeight:100,borderRadius:6,border:'1px solid #e2e8f0'}}/>}</div>
                <div className="fg">
                  <label className="fl">¿Cumple requisitos de seguridad?</label>
                  <select className="fc" value={form.cumpleSeguridad} onChange={e=>F('cumpleSeguridad',e.target.value)}>
                    <option value="SI">SÍ</option><option value="NO">NO</option>
                  </select>
                </div>
                <div className="fg">
                  <label className="fl">¿Informado por Nota Importante del Protocolo?</label>
                  <select className="fc" value={form.informadoNota} onChange={e=>F('informadoNota',e.target.value)}>
                    <option value="SI">SÍ</option><option value="NO">NO</option>
                  </select>
                </div>
                <div className="fg">
                  <label className="fl">¿Fuera de vigencia / Autorizado para botadero?</label>
                  <select className="fc" value={form.fueraVigencia} onChange={e=>F('fueraVigencia',e.target.value)}>
                    <option value="NO">NO</option><option value="SI">SÍ</option>
                  </select>
                </div>
              </div>
            </div>
            <div className="mftr"><button className="btn btn-outline" onClick={()=>setShowForm(false)}>Cancelar</button><button className="btn btn-primary" onClick={handleSave}>✅ Registrar Ítem</button></div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════ LABELS TAB ═══════════════════════ */
function LabelsTab({items, users, config, activeLabel, setActiveLabel}) {
  const [sel, setSel] = useState(activeLabel);
  const [alert, setAlert] = useState(null);
  const [sending, setSending] = useState(false);
  const [search, setSearch] = useState('');
  const labelRef = useRef();

  useEffect(()=>{ if(activeLabel) setSel(activeLabel); }, [activeLabel]);

  const flash = (msg,type='as') => { setAlert({msg,type}); setTimeout(()=>setAlert(null),5000); };

  const getUrl = item => {
    if (!item) return '';
    const base = window.location.href.split('?')[0].split('#')[0];
    const data = {
      folio:item.folio, nombre:item.nombre, tipo:item.tipo, fecha:item.fecha,
      vigencia:item.vigencia, ubicacion:item.ubicacion, observaciones:item.observaciones,
      alumnoEjecutante:item.alumnoEjecutante, supervisor:item.supervisor,
      contacto:item.contacto, correoContacto:item.correoContacto,
      investigacion:item.investigacion, cantidad:item.cantidad, foto:item.foto
    };
    return `${base}?item=${toB64(data)}`;
  };

  const handleDownload = () => {
    if(!labelRef.current) return;
    flash('Generando imagen…','ai');
    html2canvas(labelRef.current, {scale:2, useCORS:true, backgroundColor:'#fff', logging:false}).then(canvas => {
      const a = document.createElement('a');
      a.download = `Etiqueta_${sel.folio}.png`;
      a.href = canvas.toDataURL('image/png');
      a.click();
      flash('Etiqueta descargada como PNG');
    }).catch(()=>flash('Error al generar imagen','ae'));
  };

  const handleEmail = async () => {
    const {emailjsServiceId, emailjsTemplateId, emailjsPublicKey, recipientEmail} = config;
    if (!emailjsServiceId || !emailjsTemplateId || !emailjsPublicKey)
      return flash('⚙️ Configura las credenciales de EmailJS en la pestaña Configuración','ae');
    if (!recipientEmail)
      return flash('⚙️ Ingresa el correo destinatario en la pestaña Configuración','ae');
    setSending(true);
    try {
      html2canvas(labelRef.current, {scale:2, backgroundColor:'#fff', logging:false}).then(async canvas => {
        emailjs.init(emailjsPublicKey);
        await emailjs.send(emailjsServiceId, emailjsTemplateId, {
          to_email: recipientEmail,
          folio: sel.folio,
          nombre_item: sel.nombre,
          responsable: sel.alumnoEjecutante,
          supervisor: sel.supervisor,
          fecha: fmtDate(sel.fecha),
          vigencia: fmtDate(sel.vigencia),
          ubicacion: sel.ubicacion||'',
          comentarios: sel.observaciones||'',
          item_url: getUrl(sel),
          label_image: canvas.toDataURL('image/png'),
        });
        flash(`✅ Etiqueta enviada a ${recipientEmail}`);
        setSending(false);
      });
    } catch(err) {
      flash(`Error al enviar: ${err?.text || err?.message || 'desconocido'}`, 'ae');
      setSending(false);
    }
  };

  const user = users.find(u=>u.id===sel?.userId);
  const badgeClass = t => t==='material'?'bm':t==='probeta'?'bp':'be';
  const filItems = items.filter(i => !search || (i.nombre||'').toLowerCase().includes(search.toLowerCase()) || (i.folio||'').toLowerCase().includes(search.toLowerCase()));

  return (
    <div>
      {alert && <div className={`alert ${alert.type}`}>{alert.msg}</div>}
      <div style={{display:'grid', gridTemplateColumns:'260px 1fr', gap:16, alignItems:'start'}}>

        {/* Selector */}
        <div className="card" style={{position:'sticky',top:20}}>
          <div className="card-title" style={{marginBottom:10}}>🏷️ Seleccionar Ítem</div>
          <input className="fc" placeholder="🔍 Buscar…" value={search} onChange={e=>setSearch(e.target.value)} style={{marginBottom:10,fontSize:13}}/>
          <div style={{display:'flex',flexDirection:'column',gap:6,maxHeight:520,overflowY:'auto'}}>
            {filItems.length===0 && <div style={{color:'#94a3b8',fontSize:13,padding:'8px 0'}}>No hay ítems registrados.</div>}
            {filItems.map(i=>(
              <div key={i.id} className={`item-card ${sel?.id===i.id?'sel':''}`} onClick={()=>setSel(i)}>
                <div className="item-code">{i.folio}</div>
                <div className="item-name">{i.nombre}</div>
                <span className={`badge ${badgeClass(i.tipo)}`} style={{marginTop:4}}>{(i.tipo||'').toUpperCase()}</span>
                {isExpired(i.vigencia) && <span style={{marginLeft:6,fontSize:10,color:'#b91c1c',fontWeight:700}}>⚠️ VENCIDO</span>}
              </div>
            ))}
          </div>
        </div>

        {/* Preview */}
        <div>
          {!sel ? (
            <div className="card"><div className="empty"><div className="ei">🏷️</div><h3>Selecciona un ítem</h3><p>Elige un ítem de la lista para ver su etiqueta.</p></div></div>
          ) : (
            <>
              <div className="card no-print" style={{marginBottom:12}}>
                <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
                  <div style={{flex:1,minWidth:0}}>
                    <span style={{fontWeight:700,color:'#002060',fontFamily:'monospace'}}>{sel.folio}</span>
                    <span style={{color:'#64748b',marginLeft:8,fontSize:13}}>{sel.nombre}</span>
                  </div>
                  <button className="btn btn-secondary" onClick={handleDownload}>⬇️ PNG</button>
                  <button className="btn btn-primary" onClick={()=>window.print()}>🖨️ Imprimir</button>
                  <button className="btn btn-success" onClick={handleEmail} disabled={sending}>
                    {sending ? '⏳ Enviando…' : '📧 Enviar Correo'}
                  </button>
                </div>
              </div>
              <div ref={labelRef} className="label-wrap">
                <ProtocolLabel item={sel} user={user||{nombre:sel.alumnoEjecutante,supervisor:sel.supervisor,telefono:sel.contacto,correo:sel.correoContacto}} itemUrl={getUrl(sel)}/>
              </div>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════ CONFIG TAB ═══════════════════════ */
function ConfigTab({config, setConfig}) {
  const [form, setForm] = useState({...config});
  const [saved, setSaved] = useState(false);
  const F = (k,v) => setForm(f=>({...f,[k]:v}));

  const handleSave = () => { setConfig(form); save('icc_config', form); setSaved(true); setTimeout(()=>setSaved(false),3000); };

  return (
    <div>
      {saved && <div className="alert as">✅ Configuración guardada correctamente</div>}

      <div className="card">
        <div className="card-title" style={{marginBottom:16}}>📧 Envío de Correo — EmailJS</div>
        <div className="alert ai" style={{marginBottom:18}}>
          Para enviar etiquetas por correo necesitas una cuenta gratuita en{' '}
          <a href="https://www.emailjs.com" target="_blank"><strong>emailjs.com</strong></a>.
          Crea un <em>Email Service</em>, una <em>Email Template</em> y copia las credenciales aquí.
          La plantilla puede usar las variables listadas abajo.
        </div>
        <div className="g2">
          <div className="fg"><label className="fl">Service ID</label><input className="fc" value={form.emailjsServiceId||''} onChange={e=>F('emailjsServiceId',e.target.value)} placeholder="service_xxxxxxx"/></div>
          <div className="fg"><label className="fl">Template ID</label><input className="fc" value={form.emailjsTemplateId||''} onChange={e=>F('emailjsTemplateId',e.target.value)} placeholder="template_xxxxxxx"/></div>
          <div className="fg"><label className="fl">Public Key</label><input className="fc" value={form.emailjsPublicKey||''} onChange={e=>F('emailjsPublicKey',e.target.value)} placeholder="XXXXXXXXXXXXXXXXXXXX"/></div>
          <div className="fg"><label className="fl">Correo destinatario *</label><input className="fc" type="email" value={form.recipientEmail||''} onChange={e=>F('recipientEmail',e.target.value)} placeholder="laboratorio@uc.cl"/></div>
        </div>
        <button className="btn btn-primary" onClick={handleSave}>💾 Guardar Configuración</button>
      </div>

      <div className="card">
        <div className="card-title" style={{marginBottom:14}}>📋 Variables disponibles en la plantilla EmailJS</div>
        <div style={{background:'#f8fafc',padding:16,borderRadius:7,fontFamily:'monospace',fontSize:12.5,lineHeight:2,border:'1px solid #e2e8f0'}}>
          {['{{to_email}}','{{folio}}','{{nombre_item}}','{{responsable}}','{{supervisor}}','{{fecha}}','{{vigencia}}','{{ubicacion}}','{{comentarios}}','{{item_url}}','{{label_image}}'].map(v=>(
            <div key={v} style={{color:'#003087'}}>{v}</div>
          ))}
        </div>
        <div style={{marginTop:12,fontSize:13,color:'#64748b'}}>
          <strong>Nota:</strong> <code>{'{{item_url}}'}</code> es el enlace directo al ítem (para incrustar en el correo) y <code>{'{{label_image}}'}</code> es la imagen base64 de la etiqueta.
        </div>
      </div>

      <div className="card">
        <div className="card-title" style={{marginBottom:14}}>📌 Acerca del sistema</div>
        <div style={{fontSize:13.5,lineHeight:2,color:'#475569'}}>
          <div>📦 Los datos se almacenan localmente en este navegador (localStorage).</div>
          <div>📊 El Excel exportado sigue el formato de la <em>Planilla Control Protocolo de Etiquetado ICC</em>.</div>
          <div>🏷️ Cada etiqueta incluye un código QR que enlaza a la ficha del ítem.</div>
          <div>🔒 Al escanear el QR se muestra toda la información del ítem directamente en el navegador.</div>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════ ROOT APP ═══════════════════════ */
function App() {
  const [tab, setTab] = useState('inventory');
  const [users, setUsers] = useState(()=>load('icc_users'));
  const [items, setItems] = useState(()=>load('icc_items'));
  const [config, setConfig] = useState(()=>load('icc_config',{}));
  const [activeLabel, setActiveLabel] = useState(null);
  const [itemDetail, setItemDetail] = useState(null);
  const [tweakOn, setTweakOn] = useState(false);

  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "accentColor": "#003087",
    "tableFont": "13.5"
  }/*EDITMODE-END*/;
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);

  useEffect(() => {
    // QR item detail routing
    const params = new URLSearchParams(window.location.search);
    const itemParam = params.get('item');
    if (itemParam) { const d = fromB64(itemParam); if(d) setItemDetail(d); }

    // Tweaks
    const handler = e => {
      if (e.data?.type==='__activate_edit_mode') setTweakOn(true);
      if (e.data?.type==='__deactivate_edit_mode') setTweakOn(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({type:'__edit_mode_available'},'*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const goLabel = item => { setActiveLabel(item); setTab('labels'); };

  // Item detail view (QR scan destination)
  if (itemDetail) return (
    <div style={{background:'#eef2f7',minHeight:'100vh'}}>
      <div style={{background:'linear-gradient(135deg,#002060,#003087)',padding:'10px 24px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <span style={{color:'white',fontWeight:700,fontSize:15}}>ICC — DIGC PUC · Inventario Bodega</span>
        <button className="btn btn-secondary btn-sm" onClick={()=>{setItemDetail(null); window.history.replaceState({},'',window.location.pathname);}}>← Ir al Inventario</button>
      </div>
      <ItemDetailView item={itemDetail}/>
    </div>
  );

  const tabs = [
    {id:'inventory', label:'📦 Inventario'},
    {id:'users', label:'👤 Usuarios'},
    {id:'labels', label:'🏷️ Etiquetas'},
    {id:'config', label:'⚙️ Configuración'},
  ];

  return (
    <div>
      <header className="app-header">
        <PUCLogo size={42}/>
        <div>
          <h1>Sistema de Inventario — Bodega Laboratorio</h1>
          <div className="sub">Departamento de Ingeniería y Gestión de la Construcción · Pontificia Universidad Católica de Chile</div>
        </div>
      </header>

      <nav className="nav-tabs no-print">
        {tabs.map(t=>(
          <div key={t.id} className={`nav-tab ${tab===t.id?'active':''}`} onClick={()=>setTab(t.id)}>{t.label}</div>
        ))}
      </nav>

      <div className="content">
        {tab==='inventory' && <InventoryTab users={users} items={items} setItems={setItems} goLabel={goLabel}/>}
        {tab==='users' && <UsersTab users={users} setUsers={setUsers}/>}
        {tab==='labels' && <LabelsTab items={items} users={users} config={config} activeLabel={activeLabel} setActiveLabel={setActiveLabel}/>}
        {tab==='config' && <ConfigTab config={config} setConfig={setConfig}/>}
      </div>

      {/* Tweaks */}
      <div className={`twk no-print ${tweakOn?'on':''}`}>
        <h4>⚙️ Tweaks</h4>
        <div className="twkr">
          <label>Color principal</label>
          <input type="color" value={tweaks.accentColor} onChange={e=>{
            const c = e.target.value;
            setTweaks(t=>({...t,accentColor:c}));
            document.querySelectorAll('.btn-primary').forEach(el=>el.style.background=c);
            document.querySelectorAll('.nav-tab.active').forEach(el=>el.style.borderBottomColor=c);
            window.parent.postMessage({type:'__edit_mode_set_keys',edits:{accentColor:c}},'*');
          }}/>
        </div>
        <div className="twkr">
          <label>Tamaño fuente tabla</label>
          <select value={tweaks.tableFont} onChange={e=>{
            const v = e.target.value;
            setTweaks(t=>({...t,tableFont:v}));
            document.querySelectorAll('table td').forEach(el=>el.style.fontSize=v+'px');
            window.parent.postMessage({type:'__edit_mode_set_keys',edits:{tableFont:v}},'*');
          }}>
            <option value="12">Pequeño (12px)</option>
            <option value="13.5">Normal (13.5px)</option>
            <option value="15">Grande (15px)</option>
          </select>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
