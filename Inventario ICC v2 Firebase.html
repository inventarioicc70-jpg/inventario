<script type="text/babel">
const {useState,useEffect,useRef,useMemo} = React;

/* ── UTILS ── */
const uuid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const today=()=>new Date().toISOString().split('T')[0];
const fmtDate=d=>d?new Date(d+'T12:00:00').toLocaleDateString('es-CL'):'—';
const isExpired=d=>d&&new Date(d+'T23:59:59')<new Date();
const getInitials=name=>{if(!name)return'XX';const p=name.trim().split(/\s+/).filter(Boolean);return p.length>=2?(p[0][0]+p[1][0]).toUpperCase():p[0].slice(0,2).toUpperCase();};
const typeCode={material:'M',probeta:'P',equipo:'E'};
const toB64=d=>{try{return btoa(encodeURIComponent(JSON.stringify(d)));}catch{return'';}};
const fromB64=s=>{try{return JSON.parse(decodeURIComponent(atob(s)));}catch{return null;}};
const badgeClass=t=>t==='material'?'bm':t==='probeta'?'bp':'be';
const COL_USERS='users',COL_ITEMS='items',COL_RESERVAS='reservas',COL_CONFIG='config',DOC_CONFIG='app_config';

const PALETTE=['#3b82f6','#10b981','#f59e0b','#ef4444','#8b5cf6','#06b6d4','#f97316','#ec4899','#84cc16','#6366f1'];
const userColor=(idx)=>PALETTE[idx%PALETTE.length];

const compressImage=file=>new Promise(resolve=>{
  const r=new FileReader();
  r.onload=e=>{const img=new Image();img.onload=()=>{const MAX=700;let w=img.width,h=img.height;if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);resolve(c.toDataURL('image/jpeg',.55));};img.src=e.target.result;};
  r.readAsDataURL(file);
});

const generateFolio=(supervisor,alumno,tipo,items)=>{
  const sup=getInitials(supervisor),alu=getInitials(alumno),tc=typeCode[tipo]||'M';
  const prefix=`${sup}-${alu}-${tc}`;
  return `${prefix}-${String(items.filter(i=>i.folio?.startsWith(prefix)).length+1).padStart(4,'0')}`;
};

/* ── QR ── */
function QRImg({value,size=100}){
  const ref=useRef();
  useEffect(()=>{
    if(!ref.current||!value)return;
    let tries=0;
    const go=()=>{
      if(!window.QRCode){if(++tries<8)setTimeout(go,300);return;}
      ref.current.innerHTML='';
      try{new window.QRCode(ref.current,{text:value,width:size,height:size,colorDark:'#000000',colorLight:'#ffffff',correctLevel:window.QRCode.CorrectLevel.M});}catch(e){}
    };go();
  },[value,size]);
  return <div ref={ref} style={{lineHeight:0,minWidth:size,minHeight:size}}/>;
}

);

            {ic.multi?ic.txt.split('\n').map((t,j)=><div key={j}>{t}</div>):ic.ico}

          <div style={{fontSize:5.5,color:'#333',marginTop:1}}>{ic.sub}</div>

/* ── ITEM FORM MODAL (create + edit) ── */
function ItemFormModal({users,items,editItem,onClose,onSaved}){
  const ef={userId:'',nombre:'',tipo:'material',fecha:today(),ubicacion:'',foto:'',observaciones:'',vigencia:'',cumpleSeguridad:'SI',fueraVigencia:'NO',informadoNota:'SI',cantidad:''};
  const [form,setForm]=useState(editItem?{userId:editItem.userId||'',nombre:editItem.nombre||'',tipo:editItem.tipo||'material',fecha:editItem.fecha||today(),ubicacion:editItem.ubicacion||'',foto:editItem.foto||'',observaciones:editItem.observaciones||'',vigencia:editItem.vigencia||'',cumpleSeguridad:editItem.cumpleSeguridad||'SI',fueraVigencia:editItem.fueraVigencia||'NO',informadoNota:editItem.informadoNota||'SI',cantidad:editItem.cantidad||''}:ef);
  const [saving,setSaving]=useState(false);
  const [alert,setAlert]=useState(null);
  const flash=(msg,type='ae')=>setAlert({msg,type});
  const F=(k,v)=>setForm(f=>({...f,[k]:v}));

  const handlePhoto=async e=>{const file=e.target.files[0];if(!file)return;flash('Comprimiendo…','ai');const b=await compressImage(file);F('foto',b);setAlert(null);};

  const handleSave=async()=>{
    if(!form.userId)return flash('Selecciona un responsable');
    if(!form.nombre.trim())return flash('El nombre es requerido');
    if(!form.vigencia)return flash('La vigencia es requerida');
    setSaving(true);
    try{
      if(editItem){
        // Update without changing folio or id → QR stays valid
        await db.collection(COL_ITEMS).doc(editItem.id).update({...form,updatedAt:new Date().toISOString()});
        onSaved('✅ Ítem actualizado. El QR sigue siendo válido.');
      } else {
        const user=users.find(u=>u.id===form.userId);
        const folio=generateFolio(user?.supervisor,user?.nombre,form.tipo,items);
        await db.collection(COL_ITEMS).add({...form,folio,alumnoEjecutante:user?.nombre||'',supervisor:user?.supervisor||'',contacto:user?.telefono||'',correoContacto:user?.correo||'',investigacion:user?.investigacion||'',deleted:false,createdAt:new Date().toISOString()});
        onSaved(`✅ Ítem registrado — Folio: ${folio}`);
      }
      onClose();
    }catch(e){flash('Error: '+e.message);}
    setSaving(false);
  };

  return(
    <div className="overlay">
      <div className="modal" style={{maxWidth:820}}>
        <div className="mhd"><span className="mtitle">{editItem?'✏️ Editar Ítem':'➕ Agregar Ítem'}</span><button className="xbtn" onClick={onClose}>×</button></div>
        <div className="mbody">
          {alert&&<div className={`alert ${alert.type}`}>{alert.msg}</div>}
          {editItem&&<div className="alert ai" style={{marginBottom:16}}>El código QR <strong>no cambiará</strong> al editar — sigue apuntando al mismo registro en la base de datos.</div>}
          <div className="fg">
            <label className="fl">Responsable (Alumno Ejecutante) *</label>
            <select className="fc" value={form.userId} onChange={e=>F('userId',e.target.value)}>
              <option value="">— Seleccionar usuario —</option>
              {users.map(u=><option key={u.id} value={u.id}>{u.nombre}{u.supervisor?` — Sup: ${u.supervisor}`:''}</option>)}
            </select>
          </div>
          <div className="g2">
            <div className="fg"><label className="fl">Nombre del ítem *</label><input className="fc" value={form.nombre} onChange={e=>F('nombre',e.target.value)} placeholder="Ej: Fibras de caña"/></div>
            <div className="fg"><label className="fl">Tipo *</label>
              <select className="fc" value={form.tipo} onChange={e=>F('tipo',e.target.value)}>
                <option value="material">Material</option><option value="probeta">Probeta</option><option value="equipo">Equipo</option>
              </select>
            </div>
            <div className="fg"><label className="fl">Fecha de registro</label><input className="fc" type="date" value={form.fecha} onChange={e=>F('fecha',e.target.value)}/></div>
            <div className="fg"><label className="fl">Vigencia *</label><input className="fc" type="date" value={form.vigencia} onChange={e=>F('vigencia',e.target.value)}/></div>
            <div className="fg"><label className="fl">Cantidad</label><input className="fc" value={form.cantidad} onChange={e=>F('cantidad',e.target.value)} placeholder="Ej: 5 tinetas"/></div>
            <div className="fg"><label className="fl">Ubicación</label><input className="fc" value={form.ubicacion} onChange={e=>F('ubicacion',e.target.value)} placeholder="Ej: Laboratorio ICC Materiales"/></div>
            <div className="fg span2"><label className="fl">Observaciones</label><textarea className="fc" rows={3} value={form.observaciones} onChange={e=>F('observaciones',e.target.value)}/></div>
            <div className="fg">
              <label className="fl">Fotografía</label>
              <input type="file" accept="image/*" onChange={handlePhoto} className="fc"/>
              {form.foto&&<img src={form.foto} alt="" style={{marginTop:8,maxHeight:100,borderRadius:6,border:'1px solid #e2e8f0'}}/>}
            </div>
            <div className="fg"><label className="fl">¿Cumple requisitos de seguridad?</label><select className="fc" value={form.cumpleSeguridad} onChange={e=>F('cumpleSeguridad',e.target.value)}><option value="SI">SÍ</option><option value="NO">NO</option></select></div>
            <div className="fg"><label className="fl">¿Informado por Nota Importante?</label><select className="fc" value={form.informadoNota} onChange={e=>F('informadoNota',e.target.value)}><option value="SI">SÍ</option><option value="NO">NO</option></select></div>
            <div className="fg"><label className="fl">¿Fuera de vigencia / para botadero?</label><select className="fc" value={form.fueraVigencia} onChange={e=>F('fueraVigencia',e.target.value)}><option value="NO">NO</option><option value="SI">SÍ</option></select></div>
          </div>
        </div>
        <div className="mftr"><button className="btn btn-outline" onClick={onClose}>Cancelar</button><button className="btn btn-primary" onClick={handleSave} disabled={saving}>{saving?'Guardando…':editItem?'Actualizar':'Registrar'}</button></div>
      </div>
    </div>
  );
}

/* ── INVENTORY TAB ── */
function InventoryTab({users,items,goLabel}){
  const [showForm,setShowForm]=useState(false);
  const [editItem,setEditItem]=useState(null);
  const [qrItem,setQrItem]=useState(null);
  const [search,setSearch]=useState('');
  const [filterType,setFilterType]=useState('all');
  const [alert,setAlert]=useState(null);
  const flash=(msg,type='as')=>{setAlert({msg,type});setTimeout(()=>setAlert(null),4000);};

  const handleDel=async i=>{
    if(!confirm(`¿Mover "${i.nombre}" a la Papelera?`))return;
    try{await db.collection(COL_ITEMS).doc(i.id).update({deleted:true,deletedAt:new Date().toISOString()});}
    catch(e){alert(e.message);}
  };

  const exportExcel=()=>{
    const hdr=['N° FOLIO','FECHA','INVESTIGACIÓN','MATERIAL/PROBETA','TIPO','CANTIDAD','ALUMNO EJECUTANTE','DOCENTE RESPONSABLE','CONTACTO','CORREO','UBICACIÓN','VIGENCIA','CUMPLE SEGURIDAD','FUERA VIGENCIA','INFORMADO NOTA','OBSERVACIONES'];
    const rows=items.map(i=>[i.folio,i.fecha,i.investigacion||'',i.nombre,(i.tipo||'').toUpperCase(),i.cantidad||'',i.alumnoEjecutante||'',i.supervisor||'',i.contacto||'',i.correoContacto||'',i.ubicacion||'',i.vigencia||'',i.cumpleSeguridad||'',i.fueraVigencia||'',i.informadoNota||'',i.observaciones||'']);
    const wb=XLSX.utils.book_new();const ws=XLSX.utils.aoa_to_sheet([hdr,...rows]);ws['!cols']=hdr.map(()=>({wch:22}));
    XLSX.utils.book_append_sheet(wb,ws,'Inventario ICC');XLSX.writeFile(wb,`Inventario_ICC_${today()}.xlsx`);
    flash('Excel exportado');
  };

  const fil=items.filter(i=>{
    const ms=search.toLowerCase();
    const s=!ms||(i.nombre||'').toLowerCase().includes(ms)||(i.folio||'').toLowerCase().includes(ms)||(i.alumnoEjecutante||'').toLowerCase().includes(ms);
    return s&&(filterType==='all'||i.tipo===filterType);
  });

  const getItemUrl=i=>{const base=window.location.href.split('?')[0].split('#')[0];return`${base}?id=${i.id}`;};

  return(
    <div>
      {alert&&<div className={`alert ${alert.type}`}>{alert.msg}</div>}
      <div className="stats">
        {[{l:'Total Ítems',v:items.length,c:'#003087'},{l:'Materiales',v:items.filter(i=>i.tipo==='material').length,c:'#1e40af'},{l:'Probetas',v:items.filter(i=>i.tipo==='probeta').length,c:'#15803d'},{l:'Equipos',v:items.filter(i=>i.tipo==='equipo').length,c:'#92400e'}].map(s=>(
          <div key={s.l} className="stat" style={{borderLeftColor:s.c}}><div className="sv" style={{color:s.c}}>{s.v}</div><div className="sl">{s.l}</div></div>
        ))}
      </div>
      <div className="card">
        <div className="card-hd">
          <span className="card-title">📦 Inventario Bodega ICC</span>
          <div style={{display:'flex',gap:8}}>
            <button className="btn btn-success" onClick={exportExcel}>⬇️ Exportar Excel</button>
            <button className="btn btn-primary" onClick={()=>{setEditItem(null);setShowForm(true);}}>+ Agregar Ítem</button>
          </div>
        </div>
        <div style={{display:'flex',gap:10,marginBottom:14}}>
          <input className="fc" placeholder="🔍 Buscar…" value={search} onChange={e=>setSearch(e.target.value)} style={{flex:1}}/>
          <select className="fc" style={{width:160}} value={filterType} onChange={e=>setFilterType(e.target.value)}>
            <option value="all">Todos los tipos</option><option value="material">Material</option><option value="probeta">Probeta</option><option value="equipo">Equipo</option>
          </select>
        </div>
        {fil.length===0?(<div className="empty"><div className="ei">📦</div><h3>Sin ítems</h3></div>):(
          <div className="tw"><table>
            <thead><tr><th>Folio</th><th>Ítem</th><th>Tipo</th><th>Fecha</th><th>Responsable</th><th>Supervisor</th><th>Vigencia</th><th>Ubicación</th><th>Foto</th><th>Acciones</th></tr></thead>
            <tbody>{fil.map(i=>(
              <tr key={i.id}>
                <td><strong style={{color:'#003087',fontFamily:'monospace',fontSize:12.5}}>{i.folio}</strong></td>
                <td>{i.nombre}</td>
                <td><span className={`badge ${badgeClass(i.tipo)}`}>{(i.tipo||'').toUpperCase()}</span></td>
                <td>{fmtDate(i.fecha)}</td><td>{i.alumnoEjecutante}</td><td>{i.supervisor}</td>
                <td className={isExpired(i.vigencia)?'exp-warn':''}>{fmtDate(i.vigencia)}{isExpired(i.vigencia)&&' ⚠️'}</td>
                <td style={{maxWidth:130,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{i.ubicacion}</td>
                <td>{i.foto&&<img src={i.foto} alt="" className="thumb"/>}</td>
                <td><div style={{display:'flex',gap:5}}>
                  <button className="btn btn-secondary btn-sm" title="Ver QR" onClick={()=>setQrItem(i)}>🔲</button>
                  <button className="btn btn-secondary btn-sm" title="Editar ítem" onClick={()=>{setEditItem(i);setShowForm(true);}}>✏️</button>
                  <button className="btn btn-secondary btn-sm" title="Ver etiqueta" onClick={()=>goLabel(i)}>🏷️</button>
                  <button className="btn btn-danger btn-sm" title="Mover a papelera" onClick={()=>handleDel(i)}>🗑️</button>
                </div></td>
              </tr>
            ))}</tbody>
          </table></div>
        )}
      </div>

      {/* QR Modal */}
      {qrItem&&(
        <div className="overlay" onClick={()=>setQrItem(null)}>
          <div className="modal" style={{maxWidth:320}} onClick={e=>e.stopPropagation()}>
            <div className="mhd"><span className="mtitle">Código QR — {qrItem.folio}</span><button className="xbtn" onClick={()=>setQrItem(null)}>×</button></div>
            <div className="mbody" style={{display:'flex',flexDirection:'column',alignItems:'center',gap:12,padding:'28px 24px'}}>
              <div style={{border:'3px solid #003087',borderRadius:10,padding:14,background:'white',boxShadow:'0 2px 12px rgba(0,48,135,.12)'}}>
                <QRImg value={getItemUrl(qrItem)} size={180}/>
              </div>
              <div style={{textAlign:'center',marginTop:4}}>
                <div style={{fontWeight:700,fontSize:15,color:'#002060'}}>{qrItem.alumnoEjecutante}</div>
                <div style={{fontSize:13,color:'#475569',marginTop:3}}>{qrItem.nombre}</div>
                <div style={{fontSize:12,color:'#94a3b8',marginTop:2,fontFamily:'monospace'}}>{qrItem.folio}</div>
              </div>
              <button className="btn btn-primary" style={{width:'100%'}} onClick={()=>{
                const wrap=document.createElement('div');wrap.style.cssText='position:fixed;left:-9999px;top:0;background:white;padding:20px;';
                document.body.appendChild(wrap);
                new window.QRCode(wrap,{text:getItemUrl(qrItem),width:300,height:300,correctLevel:window.QRCode.CorrectLevel.M});
                setTimeout(()=>{const img=wrap.querySelector('img')||wrap.querySelector('canvas');if(!img)return;const a=document.createElement('a');a.download=`QR_${qrItem.folio}.png`;a.href=img.tagName==='CANVAS'?img.toDataURL():img.src;a.click();document.body.removeChild(wrap);},400);
              }}>⬇️ Descargar QR como PNG</button>
            </div>
          </div>
        </div>
      )}

      {showForm&&<ItemFormModal users={users} items={items} editItem={editItem} onClose={()=>setShowForm(false)} onSaved={msg=>flash(msg)}/>}
    </div>
  );
}

/* ── PAPELERA TAB ── */
function PapeleraTab({deletedItems}){
  const [alert,setAlert]=useState(null);
  const flash=(msg,type='as')=>{setAlert({msg,type});setTimeout(()=>setAlert(null),3500);};

  const handleRecover=async i=>{
    try{await db.collection(COL_ITEMS).doc(i.id).update({deleted:false,deletedAt:null});flash(`✅ "${i.nombre}" recuperado del inventario`);}
    catch(e){flash('Error: '+e.message,'ae');}
  };
  const handleForever=async i=>{
    if(!confirm(`¿Eliminar DEFINITIVAMENTE "${i.nombre}"? Esta acción no se puede deshacer.`))return;
    try{await db.collection(COL_ITEMS).doc(i.id).delete();flash('Ítem eliminado definitivamente');}
    catch(e){flash('Error: '+e.message,'ae');}
  };

  return(
    <div>
      {alert&&<div className={`alert ${alert.type}`}>{alert.msg}</div>}
      <div className="card">
        <div className="card-hd"><span className="card-title">🗑️ Papelera — Ítems Eliminados</span><span style={{fontSize:13,color:'#94a3b8'}}>{deletedItems.length} ítem(s)</span></div>
        {deletedItems.length===0?(
          <div className="empty"><div className="ei">✨</div><h3>Papelera vacía</h3><p>Los ítems eliminados aparecerán aquí.</p></div>
        ):(
          <div className="tw"><table>
            <thead><tr><th>Folio</th><th>Ítem</th><th>Tipo</th><th>Responsable</th><th>Fecha Eliminación</th><th>Acciones</th></tr></thead>
            <tbody>{deletedItems.map(i=>(
              <tr key={i.id}>
                <td><strong style={{color:'#94a3b8',fontFamily:'monospace',fontSize:12.5}}>{i.folio}</strong></td>
                <td style={{color:'#94a3b8'}}>{i.nombre}</td>
                <td><span className={`badge ${badgeClass(i.tipo)}`} style={{opacity:.6}}>{(i.tipo||'').toUpperCase()}</span></td>
                <td style={{color:'#94a3b8'}}>{i.alumnoEjecutante}</td>
                <td style={{color:'#94a3b8'}}>{i.deletedAt?new Date(i.deletedAt).toLocaleDateString('es-CL'):'—'}</td>
                <td><div style={{display:'flex',gap:6}}>
                  <button className="btn btn-success btn-sm" onClick={()=>handleRecover(i)}>↩️ Recuperar</button>
                  <button className="btn btn-danger btn-sm" onClick={()=>handleForever(i)}>✕ Eliminar definitivo</button>
                </div></td>
              </tr>
            ))}</tbody>
          </table></div>
        )}
      </div>
    </div>
  );
}

  const [showForm,setShowForm]=useState(false);
  const [form,setForm]=useState({userId:'',desde:today(),hasta:today(),comentario:''});
  const [saving,setSaving]=useState(false);
  const [alert,setAlert]=useState(null);
  const [calMonth,setCalMonth]=useState(()=>{const n=new Date();return{y:n.getFullYear(),m:n.getMonth()};});
  const flash=(msg,type='as')=>{setAlert({msg,type});setTimeout(()=>setAlert(null),4000);};
  const F=(k,v)=>setForm(f=>({...f,[k]:v}));

  useEffect(()=>{
    if(!selEquipo){setReservas([]);return;}
    // No orderBy to avoid requiring composite index — sort client-side
    const unsub=db.collection(COL_RESERVAS).where('itemId','==',selEquipo).onSnapshot(snap=>{
      const docs=snap.docs.map(d=>({id:d.id,...d.data()}));
      docs.sort((a,b)=>a.desde.localeCompare(b.desde));
      setReservas(docs);
    },err=>{
      console.error('Reservas listener error:',err);
      flash('Error al cargar reservas: '+err.message,'ae');
    });
    return()=>unsub();
  },[selEquipo]);

  const handleSave=async()=>{
    if(!form.userId)return flash('Selecciona un usuario','ae');
    if(!form.desde||!form.hasta)return flash('Selecciona fechas','ae');
    if(form.desde>form.hasta)return flash('La fecha de inicio debe ser antes de la fecha de término','ae');
    setSaving(true);
    const equipo=equipos.find(e=>e.id===selEquipo);
    const user=users.find(u=>u.id===form.userId);
    try{
      await db.collection(COL_RESERVAS).add({...form,itemId:selEquipo,itemNombre:equipo?.nombre||'',userName:user?.nombre||'',createdAt:new Date().toISOString()});
      flash('✅ Reserva registrada');setShowForm(false);setForm({userId:'',desde:today(),hasta:today(),comentario:''});
    }catch(e){flash('Error: '+e.message,'ae');}
    setSaving(false);
  };

  const handleDel=async id=>{
    if(!confirm('¿Eliminar esta reserva?'))return;
    try{await db.collection(COL_RESERVAS).doc(id).delete();}catch(e){alert(e.message);}
  };

  // Build calendar
  const {y,m}=calMonth;
  const firstDay=new Date(y,m,1).getDay(); // 0=sun
  const daysInMonth=new Date(y,m+1,0).getDate();
  const todayStr=today();

  // Map reservas to days
  const dayMap=useMemo(()=>{
    const map={};
    reservas.forEach((r,ri)=>{
      const start=new Date(r.desde+'T12:00:00');
      const end=new Date(r.hasta+'T12:00:00');
      for(let d=new Date(start);d<=end;d.setDate(d.getDate()+1)){
        const key=d.toISOString().split('T')[0];
        if(!map[key])map[key]=[];
        map[key].push({...r,_colorIdx:users.findIndex(u=>u.id===r.userId)});
      }
    });
    return map;
  },[reservas,users]);

  const monthName=new Date(y,m,1).toLocaleDateString('es-CL',{month:'long',year:'numeric'});
  const days=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];

  return(
    <div>
      {alert&&<div className={`alert ${alert.type}`}>{alert.msg}</div>}
      <div className="card">
        <div className="card-hd">
          <span className="card-title">📅 Reservas de Equipos</span>
          {selEquipo&&<button className="btn btn-primary" onClick={()=>setShowForm(true)}>+ Nueva Reserva</button>}
        </div>

        {/* Equipo selector */}
        <div className="fg">
          <label className="fl">Seleccionar Equipo</label>
          <select className="fc" value={selEquipo} onChange={e=>setSelEquipo(e.target.value)} style={{maxWidth:400}}>
            <option value="">— Seleccionar equipo —</option>
            {equipos.map(e=><option key={e.id} value={e.id}>{e.folio} — {e.nombre}</option>)}
          </select>
          {equipos.length===0&&<div style={{fontSize:13,color:'#94a3b8',marginTop:6}}>No hay equipos registrados en el inventario.</div>}
        </div>

        {selEquipo&&(
          <>
            {/* Calendar nav */}
            <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:12,marginTop:4}}>
              <button className="btn btn-secondary btn-sm" onClick={()=>setCalMonth(({y,m})=>m===0?{y:y-1,m:11}:{y,m:m-1})}>◀</button>
              <span style={{fontWeight:700,fontSize:15,flex:1,textAlign:'center',textTransform:'capitalize'}}>{monthName}</span>
              <button className="btn btn-secondary btn-sm" onClick={()=>setCalMonth(({y,m})=>m===11?{y:y+1,m:0}:{y,m:m+1})}>▶</button>
            </div>

            {/* Day headers */}
            <div className="cal-grid">
              {days.map(d=><div key={d} className="cal-hd">{d}</div>)}
              {/* Empty cells before first day */}
              {Array.from({length:firstDay}).map((_,i)=><div key={'e'+i}/>)}
              {/* Days */}
              {Array.from({length:daysInMonth}).map((_,i)=>{
                const dn=i+1;
                const dateStr=`${y}-${String(m+1).padStart(2,'0')}-${String(dn).padStart(2,'0')}`;
                const events=dayMap[dateStr]||[];
                return(
                  <div key={dn} className={`cal-day${dateStr===todayStr?' today':''}${new Date(y,m,dn).getMonth()!==m?' other-month':''}`}>
                    <div className="cal-day-num">{dn}</div>
                    {events.map((ev,ei)=>(
                      <div key={ei} className="cal-event" style={{background:userColor(ev._colorIdx),color:'white'}} title={`${ev.userName}: ${ev.comentario||''}`}>
                        {ev.userName?.split(' ')[0]}
                      </div>
                    ))}
                  </div>
                );
              })}
            </div>

            {/* Legend */}
            {reservas.length>0&&(
              <div style={{marginTop:14,display:'flex',flexWrap:'wrap',gap:8}}>
                {[...new Map(reservas.map(r=>[r.userId,r])).values()].map(r=>{
                  const idx=users.findIndex(u=>u.id===r.userId);
                  return(
                    <div key={r.userId} style={{display:'flex',alignItems:'center',gap:5,fontSize:12}}>
                      <div style={{width:12,height:12,borderRadius:3,background:userColor(idx)}}/>
                      <span>{r.userName}</span>
                    </div>
                  );
                })}
              </div>
            )}

            {/* Reservas list */}
            <div style={{marginTop:20}}>
              <div style={{fontWeight:700,fontSize:14,color:'#002060',marginBottom:10}}>Lista de reservas activas y futuras</div>
              {reservas.length===0?(
                <div style={{color:'#94a3b8',fontSize:13}}>Sin reservas registradas para este equipo.</div>
              ):(
                <div className="tw"><table>
                  <thead><tr><th>Usuario</th><th>Desde</th><th>Hasta</th><th>Comentario</th><th>Acción</th></tr></thead>
                  <tbody>{reservas.map(r=>{
                    const idx=users.findIndex(u=>u.id===r.userId);
                    const past=r.hasta<todayStr;
                    return(
                      <tr key={r.id} style={{opacity:past?.6:1}}>
                        <td><div style={{display:'flex',alignItems:'center',gap:7}}><div style={{width:10,height:10,borderRadius:3,background:userColor(idx),flexShrink:0}}/>{r.userName}</div></td>
                        <td>{fmtDate(r.desde)}</td><td>{fmtDate(r.hasta)}</td>
                        <td style={{maxWidth:220,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.comentario||'—'}</td>
                        <td><button className="btn btn-danger btn-sm" onClick={()=>handleDel(r.id)}>🗑️</button></td>
                      </tr>
                    );
                  })}</tbody>
                </table></div>
              )}
            </div>
          </>
        )}

        {!selEquipo&&equipos.length>0&&(
          <div className="empty"><div className="ei">📅</div><h3>Selecciona un equipo</h3><p>Elige un equipo para ver y gestionar sus reservas.</p></div>
        )}
      </div>

      {showForm&&(
        <div className="overlay"><div className="modal" style={{maxWidth:500}}>
          <div className="mhd"><span className="mtitle">+ Nueva Reserva</span><button className="xbtn" onClick={()=>setShowForm(false)}>×</button></div>
          <div className="mbody">
            <div style={{background:'#f0f4ff',borderRadius:7,padding:'10px 14px',marginBottom:16,fontSize:13,color:'#1e40af'}}>
              <strong>{equipos.find(e=>e.id===selEquipo)?.nombre}</strong> — varios usuarios pueden tener reservas simultáneas.
            </div>
            <div className="fg"><label className="fl">Usuario *</label>
              <select className="fc" value={form.userId} onChange={e=>F('userId',e.target.value)}>
                <option value="">— Seleccionar usuario —</option>
                {users.map(u=><option key={u.id} value={u.id}>{u.nombre}</option>)}
              </select>
            </div>
            <div className="g2">
              <div className="fg"><label className="fl">Desde *</label><input className="fc" type="date" value={form.desde} onChange={e=>F('desde',e.target.value)}/></div>
              <div className="fg"><label className="fl">Hasta *</label><input className="fc" type="date" value={form.hasta} onChange={e=>F('hasta',e.target.value)}/></div>
            </div>
            <div className="fg"><label className="fl">Comentario</label><textarea className="fc" rows={3} value={form.comentario} onChange={e=>F('comentario',e.target.value)} placeholder="Describe el uso, experimento o actividad…"/></div>
          </div>
          <div className="mftr"><button className="btn btn-outline" onClick={()=>setShowForm(false)}>Cancelar</button><button className="btn btn-primary" onClick={handleSave} disabled={saving}>{saving?'Guardando…':'Registrar Reserva'}</button></div>
        </div></div>
      )}
    </div>
  );
}

/* ── LABELS TAB ── */
function LabelsTab({items,users,config,activeLabel}){
  const [sel,setSel]=useState(activeLabel);
  const [alert,setAlert]=useState(null);
  const [sending,setSending]=useState(false);
  const [search,setSearch]=useState('');
  const labelRef=useRef();
  useEffect(()=>{if(activeLabel)setSel(activeLabel);},[activeLabel]);
  const flash=(msg,type='as')=>{setAlert({msg,type});setTimeout(()=>setAlert(null),5000);};

  const getUrl=item=>{const base=window.location.href.split('?')[0].split('#')[0];return`${base}?id=${item.id}`;};

  const handleDownload=()=>{
    if(!labelRef.current)return;
    flash('Generando imagen…','ai');
    html2canvas(labelRef.current,{scale:2,useCORS:true,backgroundColor:'#fff',logging:false}).then(c=>{
      const a=document.createElement('a');a.download=`Etiqueta_${sel.folio}.png`;a.href=c.toDataURL('image/png');a.click();flash('Etiqueta descargada');
    }).catch(()=>flash('Error al generar imagen','ae'));
  };

  const handleEmail=async()=>{
    const{emailjsServiceId,emailjsTemplateId,emailjsPublicKey,recipientEmail}=config;
    if(!emailjsServiceId||!emailjsTemplateId||!emailjsPublicKey)return flash('⚙️ Configura EmailJS en Configuración','ae');
    if(!recipientEmail)return flash('⚙️ Ingresa el correo destinatario en Configuración','ae');
    setSending(true);
    try{
      html2canvas(labelRef.current,{scale:2,backgroundColor:'#fff',logging:false}).then(async c=>{
        emailjs.init(emailjsPublicKey);
        await emailjs.send(emailjsServiceId,emailjsTemplateId,{to_email:recipientEmail,folio:sel.folio,nombre_item:sel.nombre,responsable:sel.alumnoEjecutante,supervisor:sel.supervisor,fecha:fmtDate(sel.fecha),vigencia:fmtDate(sel.vigencia),ubicacion:sel.ubicacion||'',comentarios:sel.observaciones||'',item_url:getUrl(sel),label_image:c.toDataURL('image/png')});
        flash(`✅ Etiqueta enviada a ${recipientEmail}`);setSending(false);
      });
    }catch(e){flash(`Error: ${e?.text||e?.message}`,'ae');setSending(false);}
  };

  const user=users.find(u=>u.id===sel?.userId);
  const filItems=items.filter(i=>!search||(i.nombre||'').toLowerCase().includes(search.toLowerCase())||(i.folio||'').toLowerCase().includes(search.toLowerCase()));

  return(
    <div>
      {alert&&<div className={`alert ${alert.type}`}>{alert.msg}</div>}
      <div style={{display:'grid',gridTemplateColumns:'260px 1fr',gap:16,alignItems:'start'}}>
        <div className="card" style={{position:'sticky',top:20}}>
          <div className="card-title" style={{marginBottom:10}}>🏷️ Seleccionar Ítem</div>
          <input className="fc" placeholder="🔍 Buscar…" value={search} onChange={e=>setSearch(e.target.value)} style={{marginBottom:10,fontSize:13}}/>
          <div style={{display:'flex',flexDirection:'column',gap:6,maxHeight:520,overflowY:'auto'}}>
            {filItems.length===0&&<div style={{color:'#94a3b8',fontSize:13}}>No hay ítems.</div>}
            {filItems.map(i=>(
              <div key={i.id} className={`item-card ${sel?.id===i.id?'sel':''}`} onClick={()=>setSel(i)}>
                <div className="item-code">{i.folio}</div>
                <div className="item-name">{i.nombre}</div>
                <span className={`badge ${badgeClass(i.tipo)}`} style={{marginTop:4}}>{(i.tipo||'').toUpperCase()}</span>
                {isExpired(i.vigencia)&&<span style={{marginLeft:6,fontSize:10,color:'#b91c1c',fontWeight:700}}>⚠️</span>}
              </div>
            ))}
          </div>
        </div>
        <div>
          {!sel?(
            <div className="card"><div className="empty"><div className="ei">🏷️</div><h3>Selecciona un ítem</h3></div></div>
          ):(
            <>
              <div className="card no-print" style={{marginBottom:12}}>
                <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
                  <div style={{flex:1}}><span style={{fontWeight:700,color:'#002060',fontFamily:'monospace'}}>{sel.folio}</span><span style={{color:'#64748b',marginLeft:8,fontSize:13}}>{sel.nombre}</span></div>
                  <button className="btn btn-secondary" onClick={handleDownload}>⬇️ PNG</button>
                  <button className="btn btn-primary" onClick={()=>window.print()}>🖨️ Imprimir</button>
                  <button className="btn btn-success" onClick={handleEmail} disabled={sending}>{sending?'⏳ Enviando…':'📧 Enviar Correo'}</button>
                </div>
              </div>
              <div ref={labelRef} className="label-wrap">
                <ProtocolLabel item={sel} user={user||{nombre:sel.alumnoEjecutante,supervisor:sel.supervisor,telefono:sel.contacto,correo:sel.correoContacto}} itemUrl={getUrl(sel)}/>
              </div>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

/* ── CONFIG TAB ── */
function ConfigTab({config,setConfig}){
  const [form,setForm]=useState({...config});
  const [saved,setSaved]=useState(false);const[saving,setSaving]=useState(false);
  const F=(k,v)=>setForm(f=>({...f,[k]:v}));
  const handleSave=async()=>{
    setSaving(true);
    try{await db.collection(COL_CONFIG).doc(DOC_CONFIG).set(form,{merge:true});setConfig(form);setSaved(true);setTimeout(()=>setSaved(false),3000);}
    catch(e){alert('Error: '+e.message);}
    setSaving(false);
  };
  return(
    <div>
      {saved&&<div className="alert as">✅ Configuración guardada y sincronizada</div>}
      <div className="card">
        <div className="card-title" style={{marginBottom:16}}>📧 Envío de Correo — EmailJS</div>
        <div className="alert ai" style={{marginBottom:18}}>Cuenta gratuita en <a href="https://www.emailjs.com" target="_blank"><strong>emailjs.com</strong></a>. Esta configuración se guarda en la nube.</div>
        <div className="g2">
          <div className="fg"><label className="fl">Service ID</label><input className="fc" value={form.emailjsServiceId||''} onChange={e=>F('emailjsServiceId',e.target.value)} placeholder="service_xxxxxxx"/></div>
          <div className="fg"><label className="fl">Template ID</label><input className="fc" value={form.emailjsTemplateId||''} onChange={e=>F('emailjsTemplateId',e.target.value)} placeholder="template_xxxxxxx"/></div>
          <div className="fg"><label className="fl">Public Key</label><input className="fc" value={form.emailjsPublicKey||''} onChange={e=>F('emailjsPublicKey',e.target.value)} placeholder="XXXXXXXXXXXX"/></div>
          <div className="fg"><label className="fl">Correo destinatario</label><input className="fc" type="email" value={form.recipientEmail||''} onChange={e=>F('recipientEmail',e.target.value)} placeholder="laboratorio@uc.cl"/></div>
        </div>
        <button className="btn btn-primary" onClick={handleSave} disabled={saving}>{saving?'Guardando…':'💾 Guardar'}</button>
      </div>
      <div className="card">
        <div className="card-title" style={{marginBottom:12}}>☁️ Base de Datos</div>
        <div style={{fontSize:13.5,lineHeight:2,color:'#475569'}}>
          <div>✅ Conectado a <strong>Firebase Firestore</strong> — proyecto <code>iccinventario</code></div>
          <div>🔄 Sincronización en tiempo real entre todos los usuarios</div>
          <div>🗑️ Los ítems eliminados van a la Papelera y pueden recuperarse</div>
          <div>📅 Las reservas de equipos se guardan en la colección <code>reservas</code></div>
        </div>
      </div>
    </div>
  );
}

/* ── ROOT APP ── */
function App(){
  const [tab,setTab]=useState('inventory');
  const [users,setUsers]=useState([]);
  const [allItems,setAllItems]=useState([]);
  const [config,setConfig]=useState({});
  const [activeLabel,setActiveLabel]=useState(null);
  const [itemDetail,setItemDetail]=useState(null);
  const [loading,setLoading]=useState(true);
  const [syncStatus,setSyncStatus]=useState('loading');
  const [tweakOn,setTweakOn]=useState(false);
  const TWEAK_DEFAULTS=/*EDITMODE-BEGIN*/{"accentColor":"#003087"}/*EDITMODE-END*/;
  const [tweaks,setTweaks]=useState(TWEAK_DEFAULTS);

  const items=allItems.filter(i=>!i.deleted);
  const deletedItems=allItems.filter(i=>i.deleted);

  useEffect(()=>{
    const params=new URLSearchParams(window.location.search);
    const itemId=params.get('id'),itemB64=params.get('item');
    if(itemId){
      db.collection(COL_ITEMS).doc(itemId).get().then(snap=>{
        setItemDetail(snap.exists?{id:snap.id,...snap.data()}:{folio:'—',nombre:'Ítem no encontrado',tipo:'',fecha:'',vigencia:'',ubicacion:'',observaciones:'',alumnoEjecutante:'',supervisor:'',contacto:'',correoContacto:'',investigacion:''});
        setLoading(false);
      }).catch(()=>setLoading(false));return;
    }
    if(itemB64){const d=fromB64(itemB64);if(d){setItemDetail(d);setLoading(false);return;}}

    let loaded={users:false,items:false,config:false};
    const check=()=>{if(loaded.users&&loaded.items&&loaded.config){setLoading(false);setSyncStatus('ok');}};
    const u1=db.collection(COL_USERS).orderBy('createdAt','asc').onSnapshot(s=>{setUsers(s.docs.map(d=>({id:d.id,...d.data()})));loaded.users=true;check();setSyncStatus('ok');},e=>{setSyncStatus('error');setLoading(false);});
    const u2=db.collection(COL_ITEMS).orderBy('createdAt','desc').onSnapshot(s=>{setAllItems(s.docs.map(d=>({id:d.id,...d.data()})));loaded.items=true;check();setSyncStatus('ok');},e=>{setSyncStatus('error');setLoading(false);});
    const u3=db.collection(COL_CONFIG).doc(DOC_CONFIG).onSnapshot(s=>{if(s.exists)setConfig(s.data()||{});loaded.config=true;check();},()=>{loaded.config=true;check();});
    const handler=e=>{if(e.data?.type==='__activate_edit_mode')setTweakOn(true);if(e.data?.type==='__deactivate_edit_mode')setTweakOn(false);};
    window.addEventListener('message',handler);
    window.parent.postMessage({type:'__edit_mode_available'},'*');
    return()=>{u1();u2();u3();window.removeEventListener('message',handler);};
  },[]);

  const goLabel=item=>{setActiveLabel(item);setTab('labels');};

  if(itemDetail)return(
    <div style={{background:'#eef2f7',minHeight:'100vh'}}>
      <div style={{background:'linear-gradient(135deg,#002060,#003087)',padding:'10px 24px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <span style={{color:'white',fontWeight:700,fontSize:15}}>ICC — DIGC PUC · Inventario Bodega</span>
        <button className="btn btn-secondary btn-sm" onClick={()=>{setItemDetail(null);window.history.replaceState({},'',window.location.pathname);}}>← Ir al Inventario</button>
      </div>
      <ItemDetailView item={itemDetail}/>
    </div>
  );

  if(loading)return(
    <div className="loading-screen">
      <PUCLogo size={64}/>
      <div className="spinner"/>
      <div style={{fontWeight:600,fontSize:16}}>Conectando con la base de datos…</div>
      <div style={{fontSize:13,opacity:.7}}>ICC — Inventario Bodega Laboratorio</div>
    </div>
  );

  if(syncStatus==='error')return(
    <div className="loading-screen">
      <div style={{fontSize:48}}>⚠️</div>
      <div style={{fontWeight:700,fontSize:18}}>Error de conexión</div>
      <div style={{fontSize:14,opacity:.8,textAlign:'center',maxWidth:380}}>Verifica las reglas de seguridad de Firestore y tu conexión a internet.</div>
      <button className="btn btn-secondary" style={{marginTop:8}} onClick={()=>window.location.reload()}>🔄 Reintentar</button>
    </div>
  );

  const tabs=[
    {id:'inventory',label:'📦 Inventario'},
    {id:'users',label:'👤 Usuarios'},
    {id:'reservas',label:'📅 Reservas'},
    {id:'labels',label:'🏷️ Etiquetas'},
    {id:'trash',label:`🗑️ Papelera${deletedItems.length>0?` (${deletedItems.length})`:''}` },
    {id:'config',label:'⚙️ Configuración'},
  ];

  return(
    <div>
      <header className="app-header">
        <PUCLogo size={42}/>
        <div style={{flex:1}}>
          <h1>Sistema de Inventario — Bodega Laboratorio</h1>
          <div className="sub">Departamento de Ingeniería y Gestión de la Construcción · Pontificia Universidad Católica de Chile</div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:6,fontSize:12,opacity:.85}}>
          <span className={`sync-dot ${syncStatus==='ok'?'sync-ok':syncStatus==='error'?'sync-err':'sync-loading'}`}/>
          {syncStatus==='ok'?'En línea':syncStatus==='error'?'Sin conexión':'Conectando…'}
        </div>
      </header>
      <nav className="nav-tabs no-print">
        {tabs.map(t=><div key={t.id} className={`nav-tab ${tab===t.id?'active':''}`} onClick={()=>setTab(t.id)}>{t.label}</div>)}
      </nav>
      <div className="content">
        {tab==='inventory'&&<InventoryTab users={users} items={items} goLabel={goLabel}/>}
        {tab==='users'&&<UsersTab users={users}/>}
        {tab==='reservas'&&<ReservasTab users={users} items={items}/>}
        {tab==='labels'&&<LabelsTab items={items} users={users} config={config} activeLabel={activeLabel}/>}
        {tab==='trash'&&<PapeleraTab deletedItems={deletedItems}/>}
        {tab==='config'&&<ConfigTab config={config} setConfig={setConfig}/>}
      </div>
      <div className={`twk no-print ${tweakOn?'on':''}`}>
        <h4>⚙️ Tweaks</h4>
        <div className="twkr">
          <label>Color principal</label>
          <input type="color" value={tweaks.accentColor} onChange={e=>{
            const c=e.target.value;setTweaks(t=>({...t,accentColor:c}));
            document.querySelectorAll('.btn-primary').forEach(el=>el.style.background=c);
            window.parent.postMessage({type:'__edit_mode_set_keys',edits:{accentColor:c}},'*');
          }}/>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
